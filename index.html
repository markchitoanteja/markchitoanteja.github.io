<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kuya Mark Wi-Fi Payment Ledger</title>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Internet Client Payment Ledger</h4>
                    <div class="btn-group">
                        <button class="btn btn-outline-primary" id="openDbBtn">
                            <i class="fas fa-database"></i> Open Database
                        </button>
                        <a class="btn btn-outline-success" href="javascript:void(0)" id="downloadBtn">
                            <i class="fas fa-download"></i> Download DB
                        </a>
                    </div>
                </div>

                <!-- Month Selection -->
                <div class="mb-3 d-flex gap-2">
                    <label class="form-label mb-0">Select Month:</label>
                    <select class="form-select" id="monthSelect" style="width:auto;" disabled></select>
                    <button class="btn btn-outline-secondary" id="addMonthBtn" disabled>
                        <i class="fas fa-calendar-plus"></i> Add New Month
                    </button>
                    <button class="btn btn-outline-secondary" id="copyMonthBtn" disabled>
                        <i class="fas fa-copy"></i> Copy Month
                    </button>
                </div>

                <!-- Add Client -->
                <button class="btn btn-primary mb-3" id="addBtn" disabled>
                    <i class="fas fa-user-plus"></i> Add Client
                </button>

                <!-- Table -->
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Client</th>
                            <th class="text-center">Amount</th>
                            <th class="text-center">Due Date</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="5" class="text-center text-muted">No database loaded</td>
                        </tr>
                    </tbody>
                </table>

                <div class="fw-bold mt-2">
                    Clients: <span id="clientCount">0</span> |
                    Paid: ₱<span id="paidTotal">0</span> |
                    Partially Paid: ₱<span id="partialTotal">0</span> |
                    Unpaid: ₱<span id="unpaidTotal">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Add/Edit Client -->
    <div class="modal fade" id="recordModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Client Payment</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="recordIndex">
                    <div class="mb-3">
                        <label class="form-label">Client Name</label>
                        <input class="form-control" id="name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Total Amount (₱)</label>
                        <input type="number" class="form-control" id="amount">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input class="form-control" id="dueDate" placeholder="e.g. December 5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Payment Status</label>
                        <select class="form-select" id="status">
                            <option value="Fully Paid">Fully Paid</option>
                            <option value="Partially Paid">Partially Paid</option>
                            <option value="Unpaid">Unpaid</option>
                        </select>
                    </div>
                    <!-- Partially Paid Amount will be injected here -->
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button class="btn btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=1.0.7"></script>
</body>

</html>
