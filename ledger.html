<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kuya Mark Wi-Fi Payment Ledger</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=1.3.5">
</head>

<body>
    <header class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex align-items-center gap-3">
                        <img src="logo.png" alt="Company Logo" class="company-logo rounded">
                        <div>
                            <h4 class="mb-0 fw-bold">Kuya Mark Wi-Fi</h4>
                            <small class="text-muted">Client Payment & Billing Ledger</small>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-primary" id="openDbBtn">
                            <i class="fas fa-database"></i> Open Database
                        </button>
                    </div>
                </div>

                <!-- Month Selection -->
                <section class="d-flex flex-wrap gap-2 align-items-center mb-3">
                    <span class="badge bg-primary px-3 py-2">Active Month</span>
                    <select class="form-select fw-bold" id="monthSelect" style="width:auto;" disabled></select>
                    <button class="btn btn-outline-secondary" id="addMonthBtn" disabled>
                        <i class="fas fa-calendar-plus"></i> Add Month
                    </button>
                    <button class="btn btn-outline-secondary" id="copyMonthBtn" disabled>
                        <i class="fas fa-copy"></i> Copy Month
                    </button>
                </section>

                <!-- Add Client & Search -->
                <section class="d-flex flex-wrap mb-3 align-items-center justify-content-between">
                    <!-- Add Client Button -->
                    <button class="btn btn-primary d-flex align-items-center gap-2" id="addBtn" disabled>
                        <i class="fas fa-user-plus"></i> Add Client
                    </button>

                    <!-- Search Input (floated right) -->
                    <div class="input-group flex-grow-1 flex-sm-grow-0" style="max-width: 400px;">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search clients...">
                        <button class="btn btn-outline-secondary" type="button" id="clearSearch" title="Clear search">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </section>

                <!-- Table -->
                <div class="table-responsive shadow-sm rounded">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col">Client</th>
                                <th scope="col" class="text-center">Amount</th>
                                <th scope="col" class="text-center">Due In (Days)</th>
                                <th scope="col" class="text-center">Status</th>
                                <th scope="col" class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="5" class="text-center text-muted">No database loaded</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav aria-label="Table pagination" class="mt-3">
                    <ul class="pagination justify-content-center mb-0" id="tablePagination"></ul>
                </nav>

                <!-- Dashboard Summary -->
                <div class="row mt-4 g-3 text-center">
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <small class="text-muted">Clients</small>
                                <h4 id="clientCount" class="fw-bold">0</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-success">
                            <div class="card-body text-success">
                                <small>Paid</small>
                                <h4>₱<span id="paidTotal">0</span></h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-warning">
                            <div class="card-body text-warning">
                                <small>Partial</small>
                                <h4>₱<span id="partialTotal">0</span></h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-danger">
                            <div class="card-body text-danger">
                                <small>Unpaid</small>
                                <h4>₱<span id="unpaidTotal">0</span></h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Modal for Add/Edit Client -->
    <div class="modal fade" id="recordModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Client Payment</h5>
                    <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="recordIndex">
                    <div class="mb-3">
                        <label class="form-label">Client Name</label>
                        <input class="form-control" id="name" placeholder="Enter client name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Total Amount (₱)</label>
                        <input type="number" class="form-control" id="amount" placeholder="Enter total amount">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due In (Days)</label>
                        <input type="number" class="form-control" id="dueDate" placeholder="e.g., 5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Payment Status</label>
                        <select class="form-select" id="status">
                            <option value="Fully Paid">Fully Paid</option>
                            <option value="Partially Paid">Partially Paid</option>
                            <option value="Unpaid">Unpaid</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button class="btn btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-4 mb-2">
        © 2026 Kuya Mark Wi-Fi · Internal Billing System
    </footer>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js?v=1.4.0"></script>
</body>

</html>
